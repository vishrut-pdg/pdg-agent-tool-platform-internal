# Runs the Craft Kubernetes sandbox tests against a kind cluster on each
# PR that touches sandbox source. The sandbox image is built from the
# current tree and served from a local docker registry; kind pulls from
# that registry rather than going through `kind load docker-image`,
# which would write a multi-GB tar to tmpfs-backed /tmp.
# Canonical kind-in-CI pattern: https://kind.sigs.k8s.io/docs/user/local-registry/
name: Craft Kubernetes Sandbox Tests
concurrency:
  group: Craft-K8s-Tests-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  merge_group:
  pull_request:
    branches: [main]
    paths:
      - "backend/onyx/server/features/build/sandbox/**"
      - "backend/tests/external_dependency_unit/craft/test_kubernetes_sandbox.py"
      - "backend/tests/external_dependency_unit/craft/test_kubernetes_sandbox_file_ops.py"
      - "backend/tests/external_dependency_unit/craft/test_bun_node_modules_dedup.py"
      - "backend/tests/external_dependency_unit/craft/test_snapshot_restore.py"
      - "backend/tests/external_dependency_unit/craft/test_idle_cleanup.py"
      - "backend/tests/external_dependency_unit/craft/test_skill_push.py"
      - "backend/tests/external_dependency_unit/craft/test_user_library_sync.py"
      - "backend/tests/external_dependency_unit/craft/test_ensure_sandbox_running.py"
      - "backend/tests/external_dependency_unit/craft/test_scheduled_task_executor.py"
      - "backend/tests/external_dependency_unit/craft/conftest.py"
      - ".github/workflows/pr-craft-k8s-tests.yml"
      - ".github/actions/setup-python-and-install-dependencies/**"
      - "deployment/docker_compose/docker-compose.yml"
      - "deployment/docker_compose/docker-compose.dev.yml"
      # Watch the whole chart, not just the templates we render — shared
      # inputs like _helpers.tpl, values.yaml, and Chart.yaml all feed
      # into `helm template --show-only`, so a chart edit anywhere can
      # break the render/apply flow.
      - "deployment/helm/charts/onyx/**"

permissions:
  contents: read

env:
  S3_ENDPOINT_URL: "http://localhost:9004"
  S3_AWS_ACCESS_KEY_ID: "minioadmin"
  S3_AWS_SECRET_ACCESS_KEY: "minioadmin"

  # AWS_* are forwarded by the K8s sandbox manager into each sandbox pod's
  # sidecar so the daemon's `aws s3 cp` reaches the in-cluster minio.
  # In prod these are absent and the sidecar uses IRSA.
  AWS_ACCESS_KEY_ID: "minioadmin"
  AWS_SECRET_ACCESS_KEY: "minioadmin"
  AWS_REGION: "us-east-1"
  AWS_ENDPOINT_URL: "http://minio.onyx-sandboxes.svc.cluster.local:9000"

  SANDBOX_BACKEND: "kubernetes"
  SANDBOX_NAMESPACE: "onyx-sandboxes"
  SANDBOX_SERVICE_ACCOUNT_NAME: "sandbox-file-sync"
  SANDBOX_CONTAINER_IMAGE: "localhost:5001/onyx-sandbox:ci"
  SANDBOX_S3_BUCKET: "onyx-sandbox-snapshots-ci"
  # CI runs on a 4 vCPU runner, and tests like test_skill_push provision
  # up to 4 sandbox pods concurrently (pool + 3 cohort). With prod-default
  # requests of 1 CPU/pod, the 4th pod stays Pending and trips the 60s
  # readiness ceiling. Override to tiny requests so kind's scheduler can
  # fit all four — kind isn't enforcing fairness here, just placement.
  SANDBOX_POD_CPU_REQUEST: "100m"
  SANDBOX_POD_MEMORY_REQUEST: "256Mi"
  SANDBOX_POD_CPU_LIMIT: "2000m"
  SANDBOX_POD_MEMORY_LIMIT: "4Gi"
  # Placeholder — only injected as ONYX_SERVER_URL into the pod; the
  # tests never call back to it, so the URL doesn't need to resolve.
  SANDBOX_API_SERVER_URL: "http://api-server.onyx-ci.invalid"
  # Fail fast on opencode hangs (default is 900s). Without this, CI
  # waits 15 min for ACP timeout while the 20-min workflow timeout
  # kills the job first — losing failure logs and giving zero signal.
  ACP_MESSAGE_TIMEOUT: "120"
  KIND_REGISTRY_NAME: "kind-registry"
  KIND_REGISTRY_PORT: "5001"

  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  craft-k8s-tests:
    runs-on:
      - runs-on
      - runner=4cpu-linux-x64
      - volume=100gb
      - ${{ format('run-id={0}-craft-k8s-tests', github.run_id) }}
      - extras=s3-cache
    timeout-minutes: 30

    env:
      PYTHONPATH: ./backend
      MODEL_SERVER_HOST: "disabled"
      DISABLE_TELEMETRY: "true"

    steps:
      - uses: runs-on/action@d141ef83eb66d096ce8afc767e09115a65c63b60

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python and Install Dependencies
        uses: ./.github/actions/setup-python-and-install-dependencies
        with:
          requirements: |
            backend/requirements/default.txt
            backend/requirements/dev.txt
            backend/requirements/ee.txt

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # network=host so buildx (running in a container) can push to the
      # host's registry at localhost:5001.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # ratchet:docker/setup-buildx-action@v4
        with:
          driver-opts: network=host

      - name: Start local image registry
        run: |
          docker run -d --restart=always \
            -p "127.0.0.1:${KIND_REGISTRY_PORT}:5000" \
            --name "${KIND_REGISTRY_NAME}" \
            registry:2

      - name: Build and push sandbox image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # ratchet:docker/build-push-action@v7
        with:
          context: ./backend/onyx/server/features/build/sandbox/kubernetes/docker
          file: ./backend/onyx/server/features/build/sandbox/kubernetes/docker/Dockerfile
          platforms: linux/amd64
          # CI tests don't exercise skill runtime deps (soffice/pdftoppm/pptxgenjs),
          # so skip LibreOffice et al. to keep the CI image lean.
          build-args: |
            ENABLE_SKILLS=false
          tags: localhost:5001/onyx-sandbox:ci
          push: true
          cache-from: type=gha,scope=craft-sandbox
          cache-to: type=gha,scope=craft-sandbox,mode=max

      - name: Write kind config
        run: |
          cat > "${RUNNER_TEMP}/kind-config.yaml" <<'EOF'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          containerdConfigPatches:
            - |-
              [plugins."io.containerd.grpc.v1.cri".registry]
                config_path = "/etc/containerd/certs.d"
          EOF

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # ratchet:helm/kind-action@v1.14.0
        with:
          cluster_name: onyx-craft-ci
          config: ${{ runner.temp }}/kind-config.yaml

      # Connect the registry to kind's docker network and tell containerd
      # to route localhost:5001 → kind-registry:5000.
      - name: Connect local registry to kind network
        run: |
          docker network connect "kind" "${KIND_REGISTRY_NAME}" || true
          REGISTRY_DIR="/etc/containerd/certs.d/localhost:${KIND_REGISTRY_PORT}"
          docker exec onyx-craft-ci-control-plane mkdir -p "${REGISTRY_DIR}"
          docker exec onyx-craft-ci-control-plane bash -c "cat > ${REGISTRY_DIR}/hosts.toml <<EOF
          [host.\"http://${KIND_REGISTRY_NAME}:5000\"]
          EOF"

      # Make pod IPs routable from the CI runner so write_files_to_sandbox
      # (which does httpx.post to pod_ip:8731) can reach the in-pod daemon.
      - name: Add host route to kind pod subnet
        run: |
          NODE_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' onyx-craft-ci-control-plane)
          sudo ip route add 10.244.0.0/16 via "$NODE_IP"

      # Pod spec sets nodeSelector onyx.app/workload=sandbox
      # (kubernetes_sandbox_manager.py). In prod this matches a dedicated
      # node pool; in kind we just label the single control-plane node.
      - name: Label kind node for sandbox workload
        run: kubectl label node onyx-craft-ci-control-plane onyx.app/workload=sandbox

      # `helm template` validates Chart.yaml dependencies up front, even
      # for --show-only of a parent-chart template. Add the repos and
      # build the deps so the render step doesn't error out.
      - name: Build helm chart dependencies
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo add opensearch https://opensearch-project.github.io/helm-charts
          helm repo add cloudnative-pg https://cloudnative-pg.github.io/charts
          helm repo add ot-container-kit https://ot-container-kit.github.io/helm-charts
          helm repo add minio https://charts.min.io/
          helm repo add code-interpreter https://onyx-dot-app.github.io/python-sandbox/
          helm repo update
          helm dependency build deployment/helm/charts/onyx

      # Render the sandbox namespace from the helm chart rather than
      # inlining it here, so future chart edits (labels, annotations, new
      # sandbox-scoped resources) flow into CI automatically. When you add
      # a new chart component that the K8s sandbox tests depend on, add
      # its template path to --show-only and apply it here.
      - name: Render sandbox manifests from chart
        run: |
          mkdir -p /tmp/manifests
          helm template onyx deployment/helm/charts/onyx \
            -n onyx \
            -f deployment/helm/charts/onyx/values-ci.yaml \
            --show-only templates/sandbox-namespace.yaml \
            > /tmp/manifests/sandbox.yaml
          echo "--- rendered resources ---"
          grep -E '^(kind|  name):' /tmp/manifests/sandbox.yaml || true

      # sandbox-file-sync SA isn't in the chart — it's normally created
      # out-of-band by the dev k8s-up.sh / cluster admin. Apply after the
      # rendered manifests so the namespace exists first.
      - name: Apply manifests + sandbox-file-sync SA
        run: |
          kubectl apply -f /tmp/manifests/sandbox.yaml
          kubectl -n onyx-sandboxes apply -f - <<'EOF'
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: sandbox-file-sync
          EOF

      - name: Create .env for Docker Compose
        run: |
          cat <<EOF > deployment/docker_compose/.env
          COMPOSE_PROFILES=s3-filestore
          DISABLE_TELEMETRY=true
          EOF

      - name: Start Postgres, Redis, MinIO
        run: |
          cd deployment/docker_compose
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.dev.yml \
            up -d \
            minio \
            relational_db \
            cache

      - name: Expose MinIO inside the kind cluster
        run: |
          set -eo pipefail
          MINIO_ID=$(cd deployment/docker_compose && \
            docker compose -f docker-compose.yml -f docker-compose.dev.yml ps -q minio)
          # Attach the minio container to kind's docker network so kind pods
          # can route to it; alias is cosmetic but useful for debugging.
          docker network connect kind "$MINIO_ID" --alias minio
          MINIO_IP=$(docker inspect "$MINIO_ID" \
            --format '{{ (index .NetworkSettings.Networks "kind").IPAddress }}')
          echo "minio on kind network at $MINIO_IP"

          # Pre-create the snapshot bucket so the daemon's `aws s3 cp` doesn't
          # 404 on first run.
          docker exec "$MINIO_ID" \
            mc alias set local http://localhost:9000 minioadmin minioadmin
          docker exec "$MINIO_ID" \
            mc mb -p "local/${SANDBOX_S3_BUCKET}"

          # Expose minio via a cluster Service in onyx-sandboxes so the
          # sidecar resolves `minio.onyx-sandboxes.svc.cluster.local:9000`.
          # Manual Endpoints (no selector) — points straight at the
          # container's IP on kind's docker network.
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Service
          metadata:
            name: minio
            namespace: onyx-sandboxes
          spec:
            ports:
              - port: 9000
                targetPort: 9000
                protocol: TCP
          ---
          apiVersion: v1
          kind: Endpoints
          metadata:
            name: minio
            namespace: onyx-sandboxes
          subsets:
            - addresses:
                - ip: ${MINIO_IP}
              ports:
                - port: 9000
                  protocol: TCP
          EOF

      - name: Run migrations
        run: |
          cd backend
          alembic upgrade head
          alembic heads --verbose

      - name: Run Craft K8s tests
        shell: script -q -e -c "bash --noprofile --norc -eo pipefail {0}"
        run: |
          py.test \
            --durations=8 \
            -o junit_family=xunit2 \
            -xv \
            --ff \
            -m "not nightly" \
            --log-cli-level=INFO \
            --log-cli-format='%(asctime)s %(levelname)s %(name)s:%(funcName)s:%(lineno)d %(message)s' \
            backend/tests/external_dependency_unit/craft/test_kubernetes_sandbox.py \
            backend/tests/external_dependency_unit/craft/test_kubernetes_sandbox_file_ops.py \
            backend/tests/external_dependency_unit/craft/test_bun_node_modules_dedup.py \
            backend/tests/external_dependency_unit/craft/test_snapshot_restore.py \
            backend/tests/external_dependency_unit/craft/test_idle_cleanup.py \
            backend/tests/external_dependency_unit/craft/test_skill_push.py \
            backend/tests/external_dependency_unit/craft/test_user_library_sync.py \
            backend/tests/external_dependency_unit/craft/test_ensure_sandbox_running.py \
            backend/tests/external_dependency_unit/craft/test_scheduled_task_executor.py

      - name: Disk and docker status on failure
        if: failure()
        run: |
          echo "=== df -h ==="; df -h || true
          echo "=== docker system df ==="; docker system df || true
          echo "=== docker images ==="; docker images || true
          echo "=== /tmp contents ==="; ls -lah /tmp || true

      - name: Collect kind logs on failure
        if: failure()
        run: |
          mkdir -p kind-logs
          kind export logs ./kind-logs --name onyx-craft-ci || true
          kubectl get pods -A -o wide > kind-logs/pods.txt 2>&1 || true
          kubectl describe pods -n onyx-sandboxes > kind-logs/sandbox-pods-describe.txt 2>&1 || true

      - name: Collect Docker logs on failure
        if: failure()
        run: |
          mkdir -p docker-logs
          cd deployment/docker_compose
          containers=$(docker compose -f docker-compose.yml -f docker-compose.dev.yml ps -q)
          for container in $containers; do
            name=$(docker inspect --format='{{.Name}}' "$container" | sed 's/^\///')
            docker logs "$container" > "../../docker-logs/${name}.log" 2>&1
          done

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: craft-k8s-logs
          path: |
            kind-logs/
            docker-logs/
          retention-days: 7
