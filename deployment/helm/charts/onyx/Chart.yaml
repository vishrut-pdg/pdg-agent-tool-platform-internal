apiVersion: v2
name: onyx
description: A Helm chart for Kubernetes
home: https://www.onyx.app/
sources:
  - "https://github.com/onyx-dot-app/onyx"
type: application
version: 0.5.7
appVersion: latest
annotations:
  category: Productivity
  licenses: MIT
  images: |
    - name: webserver
      image: docker.io/onyxdotapp/onyx-web-server:latest
    - name: background
      image: docker.io/onyxdotapp/onyx-backend:latest
  artifacthub.io/changes: |
    - kind: changed
      description: Gate the `celery-worker-scheduled-tasks` deployment (and
        its metrics Service, HPA, KEDA ScaledObject, and ServiceMonitor) on
        `configMap.ENABLE_CRAFT=true`. The worker only services Craft
        scheduled-task fires, so it no longer spawns on installs where
        Craft is disabled.
dependencies:
  - name: cloudnative-pg
    version: 0.26.0
    repository: https://cloudnative-pg.github.io/charts
    condition: postgresql.enabled
    alias: postgresql
  - name: opensearch
    version: 3.6.0
    repository: https://opensearch-project.github.io/helm-charts
    condition: opensearch.enabled
  - name: ingress-nginx
    version: 4.13.3
    repository: https://kubernetes.github.io/ingress-nginx
    condition: nginx.enabled
    alias: nginx
  # Installs the Redis CRD that the 'redis' subchart's CR binds to.
  - name: redis-operator
    version: 0.24.0
    repository: https://ot-container-kit.github.io/helm-charts
    condition: redis.enabled
  - name: redis
    version: 0.16.6
    repository: https://ot-container-kit.github.io/helm-charts
    condition: redis.enabled
  - name: minio
    version: 5.4.0
    repository: https://charts.min.io/
    condition: minio.enabled
  - name: code-interpreter
    version: 0.3.3
    repository: https://onyx-dot-app.github.io/python-sandbox/
    condition: codeInterpreter.enabled
