{{- /* Metrics port must match the default in metrics_server.py (_DEFAULT_PORTS).
       Do NOT use PROMETHEUS_METRICS_PORT env var in Helm — each worker needs its own port. */ -}}
{{- if and (gt (int .Values.celery_worker_scheduled_tasks.replicaCount) 0) (eq (toString (index .Values.configMap "ENABLE_CRAFT" | default "")) "true") }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "onyx.fullname" . }}-celery-worker-scheduled-tasks-metrics
  labels:
    {{- include "onyx.labels" . | nindent 4 }}
    {{- if .Values.celery_worker_scheduled_tasks.deploymentLabels }}
    {{- toYaml .Values.celery_worker_scheduled_tasks.deploymentLabels | nindent 4 }}
    {{- end }}
    metrics: "true"
spec:
  type: ClusterIP
  ports:
    - port: 9098
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "onyx.selectorLabels" . | nindent 4 }}
    {{- if .Values.celery_worker_scheduled_tasks.deploymentLabels }}
    {{- toYaml .Values.celery_worker_scheduled_tasks.deploymentLabels | nindent 4 }}
    {{- end }}
{{- end }}
